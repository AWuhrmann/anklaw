# ─────────────────────────────────────────────────────────────
#  Anki Agent — Configuration
#  Copy this file to config.yaml and fill in your values.
# ─────────────────────────────────────────────────────────────

# ── Single-machine setup (agent + Anki on the same computer) ──
# Leave host empty. run_agent.sh and local_sync.py both use db_path directly.
#
# vps:
#   host: ""
#   db_path: "~/anki-agent/cards.db"
#   script_path: "~/anki-agent"   # path to this repo

# ── Two-machine setup (agent on VPS, Anki on laptop) ──────────
# Set host to your VPS. local_sync.py will SSH in to read the queue.
#
vps:
  host: "your-vps.example.com"   # IP or hostname — leave empty for single-machine
  user: "ubuntu"
  ssh_key_path: "~/.ssh/id_rsa"
  db_path: "~/anki-agent/cards.db"
  script_path: "~/anki-agent"    # path to this repo on the VPS
  port: 22

local:
  anki_connect_url: "http://localhost:8765"

generation:
  # Only used by vps_generate.py (direct API mode).
  # The Claude Code agent (run_agent.sh) reads topics/ instead.
  cards_per_day: 20
  topic_instructions: |
    Generate flashcards about advanced Python programming.
    Focus on: async/await, decorators, metaclasses, memory management.
    Assume an intermediate audience. Avoid trivial syntax questions.
  deck_name: "Programming::Python"
  card_type: "Basic"              # "Basic" or "Cloze"
  llm_provider: "anthropic"       # "anthropic" or "openai"
  llm_model: "claude-opus-4-6"
  max_retries: 3
