# ─────────────────────────────────────────────────────────────
# Topic: Trending AI Papers
# Recent papers getting significant community attention
# ─────────────────────────────────────────────────────────────

name: "Trending AI Papers"
slug: "trending_papers"
enabled: true
description: >
  Recent AI/ML papers that are getting significant attention — authors,
  affiliations, core findings, and key concepts to learn OR historical AI/ML papers 
  that have had high impacts in the field. A preference for AI Safety papers, though
  general AI/ML papers are also important.

cards_per_run: "10-20"
deck: "Research::Papers"
card_type: "Basic" or "Cloze"
tags_base: ["papers", "ai", "research"]

research_strategy:
  suggested_search_queries:
    - "most discussed AI safety machine learning paper this week {year}"
    - "viral AI paper arxiv trending community {year}"
    - "groundbreaking ML paper recently published researchers talking about"
    - "new AI (safety) paper everyone reading site:arxiv.org OR site:openreview.net"

card_format: |
  For each paper, generate 3-8 cards following these templates EXACTLY.
  Search for the actual paper to verify authors, affiliations, and findings.
  Only use papers you can confirm exist via web search. Find below some typical structure. This
  is VERY IMPORTANT to keep in mind that these are just suggestions. Typically, try to use
  these templates, but you can adapt when it doesn't feel natural. Moreover, feel free to 
  add any information that you find relevant. You should really consider me as an 
  AI engineer who wants to make connection, learn about most useful stuff
  to understand the field in its globality. Thus, these cards below are textbook 
  examples of what you could do. You really need to ponder whether each card is
  necessary for me to understand this concept better, or else how would that card be
  best presented to me. 

  CARD 1 — What it is:
    Front: "What is the paper '[Exact Title]' about?"
    Back: "[1–2 sentence summary of the core contribution]. Published: [Month Year],
           [venue/conference or arXiv ID if preprint]."

  CARD 2 — Who wrote it:
    Front: "Who wrote '[Exact Title]' and where are they from?"
    Back: "[Lead author(s)], [affiliations]. [Note if from a major lab: Google DeepMind,
           OpenAI, Meta FAIR, academic lab, etc.]."

  CARD 3 — The approximate date it was published:
    Front: "When was '[Exact Title]' published ?"
    Back: "Approx. date (fall 2024, november, 2025, at xxx conference if important]"

  CARD 4 — Key concept:
    Front: "What is [specific technique/concept introduced in this paper]?"
    Back: "[Clear technical explanation of the concept]. How it's used in '[Title]':
           [1–2 sentences on its role in the paper]."

  CARD 5 (optional) — Follow-up / implications:
    Front: "What does '[Title]' imply for [specific subfield]?"
    Back: "[Concrete implication or direction the paper opens up]. [Community reaction
           or follow-up work if known]."

  EXTRA CARDS (optional):
    In some cards, a side concept can appear, e.g. in Grokking, we can describe it as
    a phase transition. If relevant enough for me to memorize (as in this could help 
    create connections and analogies), do some web search about this to find other 
    relevant connections. 
    Front: "When can phase transition occur in Machine Learning ?"
    Back: "1. In grokking 2. Emergent behavior (3-digit addition) 3. ..."

  RULES:
  - Use either recent papers that have real community discussion, or historical papers that haven't been treated yet.
  - Never invent a paper — if you can't verify it via web search, skip it.
  - Include the publication month and year in tags (e.g., "march-2025").
  - Tags should include: paper slug (short name), authors' last names, topic area.
  - Do not duplicate papers already in the existing cards list.
